# environment.yml
name: propepdesigner
channels:
  - conda-forge
  - bioconda
  - defaults
variables:
  PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple
  PIP_TRUSTED_HOST: mirrors.aliyun.com
dependencies:
  - python=3.8.13
  - fftw=3.3.9
  - openbabel=3.1.1
  - mmseqs2=15.6f452
  - muscle=5.1
  - mafft=7.525
  - biopython=1.83
  - logomaker=0.8
  - pip
  - pip:
    - torch==2.4.1
    - torchvision==0.19.1
    - torchaudio==2.4.1
    - tensorboard==2.14.0
    - protobuf==3.20.3
    - propy3==1.1.1
    - rdkit==2024.3.5
    - reinvent-chemistry==0.0.51
    - reinvent-scoring==0.0.73
    - fair-esm==2.0.0
    - huggingface-hub==0.36.0
    - transformers==4.46.3
    - scikit-learn==1.0.2
    - numpy==1.24.4
    - scipy==1.9.2
    - pandas==1.3.5
    - matplotlib==3.7.5
    - tqdm==4.64.1
    - pydantic==1.10.2
    - dacite==1.8.0
    - upsetplot==0.9.0
    - matplotlib-venn==1.1.2
    - seaborn==0.13.2
    - opentsne==1.0.1
    - -e .